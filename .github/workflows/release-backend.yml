name: Release Backend Executables

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release name/tag (example: v1.2.0)"
        required: true
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: server/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r server/requirements.txt pyinstaller

      - name: Build note
        shell: bash
        run: |
          echo "PyInstaller on Windows can take longer (often 8-15 minutes) due binary analysis."
          echo "Dependency cache is enabled to reduce setup time."

      - name: Resolve release name
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.release_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build backend artifact
        run: python scripts/build_backend.py --release-name "${{ steps.meta.outputs.name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.os }}
          path: artifacts/release/${{ steps.meta.outputs.name }}/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Resolve release name
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.release_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.name }}
          name: ${{ steps.meta.outputs.name }}
          files: release-assets/**/*.zip
